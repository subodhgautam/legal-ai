name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] # Change this to master if your default branch is named master
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: SubodhHF/legalai
          hf_token: ${{ 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 }}
